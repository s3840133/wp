<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetConnect | Pets</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <header class="bg-dark text-white py-4">
        <div class="container text-center">
            <h1 class="mb-1">PetConnect</h1>
            <p class="mb-0">Find your new best friend</p>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <span class="material-icons">pets</span>
                <span>PetConnect</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pets.html">Pets</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="add.html">Add Pet</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">

    <div class="row g-4">

        <!-- Left Column: Banner Image -->
        <div class="col-lg-5">
            <img src="assets/images/pets/banner.jpg" 
                 class="img-fluid rounded shadow-sm" 
                 alt="Group of pets available for adoption">
        </div>

        <!-- Right Column: Table -->
        <div class="col-lg-7">

            <h2 class="mb-4">Available Pets</h2>

            <div class="table-responsive">
                <table class="table table-striped table-hover shadow-sm">

                    <thead class="table-dark">
                        <tr>
                            <th>Name</th>
                            <th>Type</th>
                            <th>Age</th>
                            <th>Status</th>
                        </tr>
                    </thead>

                    <tbody>
                        <tr>
                            <td>Buddy</td>
                            <td>Dog</td>
                            <td>2 years</td>
                            <td>Available</td>
                        </tr>
                        <tr>
                            <td>Luna</td>
                            <td>Cat</td>
                            <td>1 year</td>
                            <td>Adopted</td>
                        </tr>
                        <tr>
                            <td>Max</td>
                            <td>Dog</td>
                            <td>6 months</td>
                            <td>Available</td>
                        </tr>
                        <tr>
                            <td>Daisy</td>
                            <td>Rabbit</td>
                            <td>1 year</td>
                            <td>Available</td>
                        </tr>
                        <tr>
                            <td>Charlie</td>
                            <td>Dog</td>
                            <td>3 years</td>
                            <td>Adopted</td>
                        </tr>
                    </tbody>

                </table>
            </div>

        </div>

    </div>

</main>
