<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PetConnect | Add Pet</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@500;600;700&display=swap" rel="stylesheet">

    <!-- Material Icons -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>

    <header class="bg-dark text-white py-4">
        <div class="container text-center">
            <h1 class="mb-1">PetConnect</h1>
            <p class="mb-0">Find your new best friend</p>
        </div>
    </header>

    <nav class="navbar navbar-expand-lg navbar-light bg-light border-bottom">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center gap-2" href="index.html">
                <span class="material-icons">pets</span>
                <span>PetConnect</span>
            </a>

            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu" aria-controls="navMenu" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <div class="collapse navbar-collapse" id="navMenu">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="pets.html">Pets</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="gallery.html">Gallery</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="add.html">Add Pet</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container my-5">

    <section class="row justify-content-center">
        <div class="col-lg-8">

            <h2 class="mb-4 text-center">Add a Pet</h2>
            <p class="text-center mb-4">Submit a new pet profile for adoption.</p>

            <form id="petForm" class="p-4 border rounded shadow-sm bg-light">

                <div class="mb-3">
                    <label for="petName" class="form-label">Pet Name</label>
                    <input type="text" class="form-control" id="petName" name="petName" placeholder="Enter pet name" required>
                </div>

                <div class="mb-3">
                    <label for="petType" class="form-label">Pet Type</label>
                    <select class="form-select" id="petType" name="petType" required>
                        <option value="">Select pet type</option>
                        <option value="Dog">Dog</option>
                        <option value="Cat">Cat</option>
                        <option value="Rabbit">Rabbit</option>
                        <option value="Bird">Bird</option>
                    </select>
                </div>

                <div class="mb-3">
                    <label for="petAge" class="form-label">Age</label>
                    <input type="text" class="form-control" id="petAge" name="petAge" placeholder="Example: 2 years" required>
                </div>

                <div class="mb-3">
                    <label class="form-label d-block">Status</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="petStatus" id="available" value="Available" required>
                        <label class="form-check-label" for="available">Available</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="petStatus" id="adopted" value="Adopted" required>
                        <label class="form-check-label" for="adopted">Adopted</label>
                    </div>
                </div>

                <div class="mb-3">
                    <label for="petDescription" class="form-label">Description</label>
                    <textarea class="form-control" id="petDescription" name="petDescription" rows="4" placeholder="Write a short description of the pet" required></textarea>
                </div>

                <div class="mb-3">
                    <label for="petImage" class="form-label">Upload Pet Image</label>
                    <input class="form-control" type="file" id="petImage" name="petImage" accept=".jpg,.jpeg,.png,.webp" required>
                    <div class="form-text">Accepted file types: JPG, JPEG, PNG, WEBP</div>
                </div>

                <div class="mb-3 text-center">
                    <img id="imagePreview" src="" alt="Preview of selected pet" class="img-fluid rounded shadow-sm d-none preview-image">
                </div>

                <div id="fileError" class="text-danger mb-3"></div>

                <div class="d-grid">
                    <button type="submit" class="btn btn-dark">Submit Pet</button>
                </div>

            </form>

        </div>
    </section>

</main>

    <footer class="bg-dark text-white py-3 mt-5">
        <div class="container text-center">
            <p class="mb-0">© 2026 PetConnect | Created by S3840133</p>
        </div>
    </footer>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <!-- Custom JS -->
    <script src="assets/js/scripts.js"></script>
</body>
</html>
